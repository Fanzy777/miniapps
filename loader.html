<!DOCTYPE html>
<html>
<head>
    <title>Грузчик</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a2a4d, #2a3a6e);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid #f0a500;
        }
        .stats {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            display: flex;
            justify-content: space-around;
            font-size: 18px;
        }
        .exp-hint {
            background: rgba(240,165,0,0.15);
            border: 1px solid rgba(240,165,0,0.4);
            padding: 6px 12px;
            text-align: center;
            font-size: 13px;
            color: #f0c040;
        }
        .exp-popup {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,210,0,0.92);
            color: #1a1000;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .exp-popup.show { opacity: 1; }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 20px 16px;
            position: relative;
        }

        .zone-label {
            font-size: 13px;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            margin-bottom: 6px;
        }

        .boxes-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .box-slot {
            width: 58px;
            height: 58px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            background: rgba(255,200,50,0.18);
            border: 2px solid rgba(255,200,50,0.5);
        }
        .box-slot:hover { transform: scale(1.1); }
        .box-slot:active { transform: scale(0.9); }
        .box-slot.done {
            background: rgba(60,200,100,0.2);
            border: 2px solid rgba(60,200,100,0.45);
            cursor: default;
            opacity: 0.6;
        }

        .arrow-area {
            font-size: 32px;
            opacity: 0.5;
            letter-spacing: 4px;
        }

        .drop-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .drop-slot {
            width: 58px;
            height: 58px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: default;
            user-select: none;
            transition: transform 0.1s;
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
        }
        .drop-slot.active {
            background: rgba(60,200,100,0.22);
            border: 2px solid rgba(60,200,100,0.6);
            cursor: pointer;
            animation: pulse 0.6s infinite alternate;
        }
        .drop-slot.active:active { transform: scale(0.9); }
        .drop-slot.filled {
            background: rgba(60,200,100,0.2);
            border: 2px solid rgba(60,200,100,0.5);
        }
        @keyframes pulse {
            from { box-shadow: 0 0 0 0 rgba(60,200,100,0.4); }
            to   { box-shadow: 0 0 0 8px rgba(60,200,100,0); }
        }

        .cd-wrap {
            width: 100%;
            max-width: 340px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        .cd-bar-bg {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .cd-bar {
            height: 100%;
            background: #f0a500;
            border-radius: 3px;
            transition: width 0.1s linear;
            width: 100%;
        }

        .cooldown-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.88);
            color: #ff5555;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: bold;
            border: 2px solid #ff4444;
            z-index: 999;
            text-align: center;
            display: none;
            white-space: nowrap;
        }

        .footer {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        button {
            background: #cc3300;
            color: white;
            border: 2px solid #991100;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">📦 ГРУЗЧИК</div>
    <div class="stats">
        <span>Перенесено: <span id="count">0</span></span>
        <span>⏱️ Время: <span id="timer">0</span>с</span>
        <span>✨ До опыта: <span id="expCountdown">5</span></span>
    </div>
    <div class="exp-hint">⭐ Каждые 5 коробок = +1 опыт при сдаче</div>
    <div class="exp-popup" id="expPopup">⭐ +1 опыт при сдаче!</div>
    <div class="cooldown-msg" id="cooldownMsg">⏳ Не так быстро!</div>

    <div class="game-area">
        <div>
            <div class="zone-label">📥 Склад — возьми коробку</div>
            <div class="boxes-row" id="boxesRow"></div>
        </div>

        <div class="arrow-area">↓ ↓ ↓</div>

        <div>
            <div class="zone-label">🚛 Грузовик — положи коробку</div>
            <div class="drop-row" id="dropRow"></div>
        </div>

        <div class="cd-wrap">
            <span>Перезарядка:</span>
            <div class="cd-bar-bg"><div class="cd-bar" id="cdBar"></div></div>
            <span id="cdSec">0с</span>
        </div>
    </div>

    <div class="footer">
        <button onclick="finishWork()">🏁 ЗАКОНЧИТЬ РАБОТУ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const SLOTS = 5;
        const EXP_EVERY = 5;
        const COOLDOWN = 4000;

        let collected = 0;
        let timeElapsed = 0;
        let gameActive = true;
        let carrying = false;
        let lastPickTime = 0;
        let timerInterval, cdInterval;
        let carryingSlotIdx = -1;

        const BOX_TYPES = ['📦','📦','📦','🗃️','🗃️','📫'];
        function randomBox() {
            return BOX_TYPES[Math.floor(Math.random() * BOX_TYPES.length)];
        }

        function buildGrid() {
            const boxRow = document.getElementById('boxesRow');
            const dropRow = document.getElementById('dropRow');
            boxRow.innerHTML = '';
            dropRow.innerHTML = '';

            for (let i = 0; i < SLOTS; i++) {
                const b = document.createElement('div');
                b.className = 'box-slot';
                b.id = 'box' + i;
                b.textContent = randomBox();
                b.onclick = () => pickBox(i);
                boxRow.appendChild(b);

                const d = document.createElement('div');
                d.className = 'drop-slot';
                d.id = 'drop' + i;
                dropRow.appendChild(d);
            }
        }

        function pickBox(idx) {
            if (!gameActive || carrying) return;
            const now = Date.now();
            const diff = now - lastPickTime;
            if (lastPickTime !== 0 && diff < COOLDOWN) {
                const s = Math.ceil((COOLDOWN - diff) / 1000);
                showCooldown(s);
                return;
            }
            const box = document.getElementById('box' + idx);
            if (!box || box.classList.contains('done')) return;

            carrying = true;
            carryingSlotIdx = idx;
            lastPickTime = now;

            box.style.opacity = '0.4';
            startCdBar();

            const drop = document.getElementById('drop' + idx);
            drop.classList.add('active');
            drop.textContent = '📥';
            drop.onclick = () => dropBox(idx);
        }

        function dropBox(idx) {
            if (!gameActive || !carrying || carryingSlotIdx !== idx) return;
            const box = document.getElementById('box' + idx);
            const drop = document.getElementById('drop' + idx);

            drop.classList.remove('active');
            drop.classList.add('filled');
            drop.textContent = box ? box.textContent : '📦';
            drop.onclick = null;

            if (box) {
                box.classList.add('done');
                box.textContent = '✓';
                box.onclick = null;
                box.style.opacity = '1';
            }

            carrying = false;
            carryingSlotIdx = -1;
            collected++;
            document.getElementById('count').textContent = collected;
            updateExp();

            if (collected % EXP_EVERY === 0) showExpPopup();

            const remaining = document.querySelectorAll('.box-slot:not(.done)');
            if (remaining.length === 0) {
                setTimeout(buildGrid, 700);
            }
        }

        function updateExp() {
            const rem = EXP_EVERY - (collected % EXP_EVERY);
            document.getElementById('expCountdown').textContent = rem || EXP_EVERY;
        }

        function showExpPopup() {
            const p = document.getElementById('expPopup');
            p.classList.add('show');
            setTimeout(() => p.classList.remove('show'), 1600);
        }

        function showCooldown(s) {
            const m = document.getElementById('cooldownMsg');
            m.textContent = `⏳ Не так быстро! Подожди ${s} сек.`;
            m.style.display = 'block';
            clearTimeout(m._t);
            m._t = setTimeout(() => m.style.display = 'none', 1500);
        }

        function startCdBar() {
            const bar = document.getElementById('cdBar');
            const sec = document.getElementById('cdSec');
            bar.style.width = '100%';
            clearInterval(cdInterval);
            const start = Date.now();
            cdInterval = setInterval(() => {
                const elapsed = Date.now() - start;
                const pct = Math.max(0, 100 - (elapsed / COOLDOWN) * 100);
                bar.style.width = pct + '%';
                sec.textContent = Math.max(0, Math.ceil((COOLDOWN - elapsed) / 1000)) + 'с';
                if (elapsed >= COOLDOWN) {
                    clearInterval(cdInterval);
                    bar.style.width = '100%';
                    sec.textContent = '0с';
                }
            }, 80);
        }

        function finishWork() {
            gameActive = false;
            clearInterval(timerInterval);
            clearInterval(cdInterval);
            tg.sendData(JSON.stringify({ action: 'loader', count: collected }));
            setTimeout(() => tg.close(), 500);
        }

        timerInterval = setInterval(() => {
            timeElapsed++;
            document.getElementById('timer').textContent = timeElapsed;
        }, 1000);

        buildGrid();
    </script>
</body>
</html>
