<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Достижения</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f0c040;
            --green: #3ddc84;
            --blue: #4da8ff;
            --gc: #b06aff;
            --bg: #0d0f1a;
            --bg2: #151827;
            --bg3: #1e2236;
            --border: rgba(255,255,255,0.07);
            --text: #e8eaf0;
            --muted: rgba(255,255,255,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, #1a1030 0%, #0d1a2e 100%);
            border-bottom: 1px solid var(--border);
            padding: 20px 16px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), #e07800);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #1a0800;
            flex-shrink: 0;
            box-shadow: 0 0 0 2px rgba(240,192,64,0.3);
            overflow: hidden;
        }
        .header-info { flex: 1; }
        .header-nick {
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 0.5px;
            line-height: 1;
        }
        .header-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
        }
        .header-stats {
            display: flex;
            gap: 8px;
        }
        .stat-pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stat-pill.done { color: var(--green); border-color: rgba(61,220,132,0.2); }
        .stat-pill.total { color: var(--muted); }

        /* TABS */
        .tabs {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            flex-shrink: 0;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab.active {
            background: var(--gold);
            color: #1a0800;
            border-color: var(--gold);
        }

        /* CONTENT */
        .content { padding: 12px 16px 100px; }
        .category-title {
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 16px 0 10px;
        }

        /* EMPTY */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.3);
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state .empty-title {
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .empty-state .empty-sub { font-size: 13px; }

        /* CARD */
        .ach-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .ach-card:active { transform: scale(0.98); }
        .ach-card.done {
            border-color: rgba(61,220,132,0.25);
            background: linear-gradient(135deg, rgba(61,220,132,0.05) 0%, var(--bg2) 100%);
        }
        .ach-card.done::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--green), transparent);
        }
        .ach-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
        }
        .ach-card.done .ach-icon {
            background: rgba(61,220,132,0.1);
            border-color: rgba(61,220,132,0.3);
        }
        .ach-body { flex: 1; min-width: 0; }
        .ach-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 4px;
        }
        .ach-name {
            font-family: 'Oswald', sans-serif;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.2;
        }
        .ach-badge {
            flex-shrink: 0;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 10px;
            letter-spacing: 0.5px;
        }
        .ach-badge.done {
            background: rgba(61,220,132,0.15);
            color: var(--green);
            border: 1px solid rgba(61,220,132,0.3);
        }
        .ach-badge.pending {
            background: rgba(255,255,255,0.05);
            color: var(--muted);
            border: 1px solid var(--border);
        }
        .ach-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4;
            margin-bottom: 8px;
        }
        .ach-rewards {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .reward-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .reward-tag.money { background: rgba(240,192,64,0.12); color: var(--gold); border: 1px solid rgba(240,192,64,0.25); }
        .reward-tag.exp { background: rgba(77,168,255,0.12); color: var(--blue); border: 1px solid rgba(77,168,255,0.25); }
        .reward-tag.gc { background: rgba(176,106,255,0.12); color: var(--gc); border: 1px solid rgba(176,106,255,0.25); }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--bg3);
            border-radius: 20px 20px 0 0;
            border-top: 1px solid var(--border);
            padding: 20px 20px 40px;
            width: 100%;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .modal-overlay.show .modal { transform: translateY(0); }
        .modal-handle {
            width: 36px; height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            margin: 0 auto 20px;
        }
        .modal-icon {
            width: 72px; height: 72px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            margin: 0 auto 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
        }
        .modal-icon.done { background: rgba(61,220,132,0.12); border-color: rgba(61,220,132,0.3); }
        .modal-name {
            font-family: 'Oswald', sans-serif;
            font-size: 22px; font-weight: 700;
            text-align: center; margin-bottom: 6px;
        }
        .modal-category {
            font-size: 12px; color: var(--muted);
            text-align: center; letter-spacing: 1px;
            text-transform: uppercase; margin-bottom: 16px;
        }
        .modal-desc {
            font-size: 14px; color: rgba(255,255,255,0.7);
            text-align: center; line-height: 1.6; margin-bottom: 20px;
        }
        .modal-status {
            padding: 8px 16px; border-radius: 12px;
            font-size: 13px; font-weight: 600;
            margin-bottom: 20px;
            display: flex; justify-content: center;
        }
        .modal-status.done { background: rgba(61,220,132,0.12); color: var(--green); border: 1px solid rgba(61,220,132,0.25); }
        .modal-status.pending { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }
        .modal-rewards-title {
            font-size: 11px; color: var(--muted);
            letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px;
        }
        .modal-rewards { display: flex; gap: 8px; flex-wrap: wrap; }
        .modal-reward-tag {
            flex: 1; min-width: 80px;
            padding: 10px; border-radius: 12px;
            text-align: center; font-weight: 600;
        }
        .modal-reward-tag .r-icon { font-size: 18px; display: block; margin-bottom: 4px; }
        .modal-reward-tag .r-val { font-size: 14px; display: block; }
        .modal-reward-tag .r-label { font-size: 10px; display: block; opacity: 0.7; margin-top: 1px; }
        .modal-reward-tag.money { background: rgba(240,192,64,0.1); color: var(--gold); border: 1px solid rgba(240,192,64,0.2); }
        .modal-reward-tag.exp { background: rgba(77,168,255,0.1); color: var(--blue); border: 1px solid rgba(77,168,255,0.2); }
        .modal-reward-tag.gc { background: rgba(176,106,255,0.1); color: var(--gc); border: 1px solid rgba(176,106,255,0.2); }
        .close-btn {
            width: 100%; margin-top: 20px; padding: 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border); border-radius: 12px;
            color: var(--text); font-size: 14px; font-weight: 600;
            cursor: pointer; font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div class="avatar" id="avatarEl"></div>
            <div class="header-info">
                <div class="header-nick" id="nickEl">—</div>
                <div class="header-sub">Гангстерский Мир — Достижения</div>
            </div>
        </div>
        <div class="header-stats">
            <div class="stat-pill done">✅ <span id="doneCount">0</span> выполнено</div>
            <div class="stat-pill total">📋 <span id="totalCount">0</span> всего</div>
        </div>
    </div>

    <div class="tabs" id="tabsEl"></div>
    <div class="content" id="contentEl"></div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal">
            <div class="modal-handle"></div>
            <div class="modal-icon" id="mIcon"></div>
            <div class="modal-name" id="mName"></div>
            <div class="modal-category" id="mCat"></div>
            <div class="modal-desc" id="mDesc"></div>
            <div class="modal-status" id="mStatus"></div>
            <div class="modal-rewards-title">🎁 НАГРАДЫ</div>
            <div class="modal-rewards" id="mRewards"></div>
            <button class="close-btn" onclick="closeModalBtn()">Закрыть</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        const NICKNAME = params.get('nick') || 'Игрок';
        const photoUrl = params.get('photo');
        const doneIds = new Set((params.get('done') || '').split(',').filter(Boolean).map(Number));

        let ACHIEVEMENTS = [];
        try {
            ACHIEVEMENTS = JSON.parse(params.get('achs') || '[]');
        } catch(e) {
            ACHIEVEMENTS = [];
        }

        // Отмечаем выполненные
        ACHIEVEMENTS.forEach(a => { a.done = doneIds.has(a.id); });

        // Аватарка
        const avatarEl = document.getElementById('avatarEl');
        if (photoUrl) {
            avatarEl.innerHTML = `<img src="${photoUrl}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;">`;
        } else {
            avatarEl.textContent = NICKNAME.charAt(0).toUpperCase();
        }
        document.getElementById('nickEl').textContent = NICKNAME;

        // Счётчики
        document.getElementById('doneCount').textContent = ACHIEVEMENTS.filter(a => a.done).length;
        document.getElementById('totalCount').textContent = ACHIEVEMENTS.length;

        // Категории
        const cats = [...new Set(ACHIEVEMENTS.map(a => a.cat).filter(Boolean))];
        const CATEGORIES = cats.length > 1 ? ['Все', ...cats] : cats;
        let activeCategory = CATEGORIES[0] || 'Все';

        // Табы
        const tabsEl = document.getElementById('tabsEl');
        CATEGORIES.forEach(cat => {
            const t = document.createElement('div');
            t.className = 'tab' + (cat === activeCategory ? ' active' : '');
            t.textContent = cat;
            t.onclick = () => {
                activeCategory = cat;
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                renderContent();
            };
            tabsEl.appendChild(t);
        });

        function buildRewardTags(a) {
            let html = '';
            if (a.money > 0) html += `<div class="reward-tag money">💵 $${Number(a.money).toLocaleString()}</div>`;
            if (a.exp > 0) html += `<div class="reward-tag exp">⭐ ${a.exp} опыт</div>`;
            if (a.gc > 0) html += `<div class="reward-tag gc">💎 ${a.gc} GC</div>`;
            return html || '<span style="font-size:12px;color:var(--muted)">Без награды</span>';
        }

        function makeCard(a) {
            const card = document.createElement('div');
            card.className = 'ach-card' + (a.done ? ' done' : '');
            card.onclick = () => openModal(a);
            card.innerHTML = `
                <div class="ach-icon">${a.icon || '🏆'}</div>
                <div class="ach-body">
                    <div class="ach-top">
                        <div class="ach-name">${a.name}</div>
                        <div class="ach-badge ${a.done ? 'done' : 'pending'}">${a.done ? '✅ ВЫПОЛНЕНО' : '⏳ НЕ ВЫПОЛНЕНО'}</div>
                    </div>
                    <div class="ach-desc">${a.desc || ''}</div>
                    <div class="ach-rewards">${buildRewardTags(a)}</div>
                </div>
            `;
            return card;
        }

        function renderContent() {
            const contentEl = document.getElementById('contentEl');
            contentEl.innerHTML = '';

            if (ACHIEVEMENTS.length === 0) {
                contentEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">😔</div>
                        <div class="empty-title">Пока пусто...</div>
                        <div class="empty-sub">Достижения ещё не добавлены</div>
                    </div>`;
                return;
            }

            const filtered = (activeCategory === 'Все')
                ? ACHIEVEMENTS
                : ACHIEVEMENTS.filter(a => a.cat === activeCategory);

            if (filtered.length === 0) {
                contentEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">😔</div>
                        <div class="empty-title">Пока пусто :(</div>
                        <div class="empty-sub">В этой категории нет достижений</div>
                    </div>`;
                return;
            }

            if (activeCategory === 'Все') {
                cats.forEach(cat => {
                    const items = ACHIEVEMENTS.filter(a => a.cat === cat);
                    if (!items.length) return;
                    const title = document.createElement('div');
                    title.className = 'category-title';
                    title.textContent = cat;
                    contentEl.appendChild(title);
                    items.forEach(a => contentEl.appendChild(makeCard(a)));
                });
            } else {
                filtered.forEach(a => contentEl.appendChild(makeCard(a)));
            }
        }

        function openModal(a) {
            document.getElementById('mIcon').className = 'modal-icon' + (a.done ? ' done' : '');
            document.getElementById('mIcon').textContent = a.icon || '🏆';
            document.getElementById('mName').textContent = a.name;
            document.getElementById('mCat').textContent = a.cat || '';
            document.getElementById('mDesc').textContent = a.desc || '';

            const statusEl = document.getElementById('mStatus');
            statusEl.className = 'modal-status ' + (a.done ? 'done' : 'pending');
            statusEl.textContent = a.done ? '✅ Достижение выполнено!' : '⏳ Ещё не выполнено';

            const rewardsEl = document.getElementById('mRewards');
            rewardsEl.innerHTML = '';
            if (a.money > 0) rewardsEl.innerHTML += `<div class="modal-reward-tag money"><span class="r-icon">💵</span><span class="r-val">$${Number(a.money).toLocaleString()}</span><span class="r-label">Деньги</span></div>`;
            if (a.exp > 0) rewardsEl.innerHTML += `<div class="modal-reward-tag exp"><span class="r-icon">⭐</span><span class="r-val">${a.exp}</span><span class="r-label">Опыт</span></div>`;
            if (a.gc > 0) rewardsEl.innerHTML += `<div class="modal-reward-tag gc"><span class="r-icon">💎</span><span class="r-val">${a.gc}</span><span class="r-label">GC</span></div>`;
            if (!a.money && !a.exp && !a.gc) rewardsEl.innerHTML = `<span style="font-size:13px;color:var(--muted)">Без награды</span>`;

            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal(e) {
            if (e.target === document.getElementById('modalOverlay'))
                document.getElementById('modalOverlay').classList.remove('show');
        }
        function closeModalBtn() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        renderContent();
    </script>
</body>
</html>
