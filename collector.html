<!DOCTYPE html>
<html>
<head>
    <title>Сборщик бутылок</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a4d2e, #2a5e3a);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid gold;
        }
        .stats {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            display: flex;
            justify-content: space-around;
            font-size: 18px;
        }
        .exp-hint {
            background: rgba(255, 215, 0, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 6px 12px;
            text-align: center;
            font-size: 13px;
            color: #ffd700;
        }
        .exp-popup {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 215, 0, 0.9);
            color: #1a1a1a;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .exp-popup.show {
            opacity: 1;
        }
        .game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 400px;
            background: #2a5e3a;
            background-image: radial-gradient(circle, #3a7e4a 2px, transparent 2px);
            background-size: 40px 40px;
        }
        .bottle {
            position: absolute;
            width: 40px;
            height: 50px;
            cursor: pointer;
            user-select: none;
            font-size: 30px;
            text-align: center;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.3));
            transition: transform 0.1s;
        }
        .bottle:hover {
            transform: scale(1.1);
        }
        .bottle:active {
            transform: scale(0.9);
        }
        .cooldown-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: #ff4444;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ff4444;
            z-index: 999;
            text-align: center;
            display: none;
        }
        .footer {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        button {
            background: #ff4444;
            color: white;
            border: 2px solid #cc0000;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header">🍾 СБОРЩИК БУТЫЛОК</div>
    <div class="stats">
        <span>Собрано: <span id="count">0</span></span>
        <span>⏱️ Время: <span id="timer">0</span>с</span>
        <span>✨ До опыта: <span id="expCountdown">1</span></span>
    </div>
    <div class="exp-hint">⭐ Каждая бутылка = +1 опыт при сдаче скупщику</div>
    <div class="exp-popup" id="expPopup">⭐ +1 опыт за бутылку!</div>
    <div class="game-area" id="gameArea"></div>
    <div class="cooldown-msg" id="cooldownMsg">⏳ Не так быстро!</div>
    <div class="footer">
        <button onclick="finishCollection()">🏁 ЗАКОНЧИТЬ СБОР</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let collected = 0;
        let timeElapsed = 0;
        let timerInterval;
        let gameActive = true;
        let lastCollectTime = 0;
        const COOLDOWN_MS = 5000;
        const EXP_PER_BOTTLES = 1;

        function updateExpCountdown() {
            const remaining = EXP_PER_BOTTLES - (collected % EXP_PER_BOTTLES);
            document.getElementById('expCountdown').innerText = remaining;
        }

        function showExpPopup() {
            const popup = document.getElementById('expPopup');
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 1500);
        }

        function showCooldown(secondsLeft) {
            const msg = document.getElementById('cooldownMsg');
            msg.textContent = `⏳ Не так быстро! Подожди ${secondsLeft} сек.`;
            msg.style.display = 'block';
            clearTimeout(msg._hideTimer);
            msg._hideTimer = setTimeout(() => {
                msg.style.display = 'none';
            }, 1500);
        }

        function createBottle() {
            if (!gameActive) return;

            const gameArea = document.getElementById('gameArea');
            const old = gameArea.querySelector('.bottle');
            if (old) old.remove();

            const bottle = document.createElement('div');
            bottle.className = 'bottle';
            bottle.innerHTML = '🍾';

            const maxX = gameArea.clientWidth - 50;
            const maxY = gameArea.clientHeight - 60;
            const x = Math.max(10, Math.min(maxX, Math.random() * maxX));
            const y = Math.max(10, Math.min(maxY, Math.random() * maxY));

            bottle.style.left = x + 'px';
            bottle.style.top = y + 'px';

            bottle.onclick = function () {
                if (!gameActive) return;

                const now = Date.now();
                const diff = now - lastCollectTime;

                if (lastCollectTime !== 0 && diff < COOLDOWN_MS) {
                    const secondsLeft = Math.ceil((COOLDOWN_MS - diff) / 1000);
                    showCooldown(secondsLeft);
                    return;
                }

                lastCollectTime = now;
                collected++;
                document.getElementById('count').innerText = collected;

                // Каждые 10 бутылок — показываем уведомление про опыт
                if (collected % EXP_PER_BOTTLES === 0) {
                    showExpPopup();
                }

                updateExpCountdown();
                this.remove();
                setTimeout(createBottle, 300);
            };

            gameArea.appendChild(bottle);
        }

        function startGame() {
            updateExpCountdown();
            createBottle();

            timerInterval = setInterval(() => {
                timeElapsed++;
                document.getElementById('timer').innerText = timeElapsed;
            }, 1000);
        }

        function finishCollection() {
            gameActive = false;
            clearInterval(timerInterval);
            document.querySelectorAll('.bottle').forEach(b => b.remove());

            tg.sendData(JSON.stringify({
                action: 'collect',
                count: collected
            }));

            setTimeout(() => tg.close(), 500);
        }

        window.onload = startGame;
    </script>
</body>
</html>
