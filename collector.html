<!DOCTYPE html>
<html>
<head>
    <title>Сборщик бутылок</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a4d2e, #2a5e3a);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 2px solid gold;
        }
        .stats {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            display: flex;
            justify-content: space-around;
            font-size: 18px;
        }
        .game-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            min-height: 400px;
            background: #2a5e3a;
            background-image: radial-gradient(circle, #3a7e4a 2px, transparent 2px);
            background-size: 40px 40px;
        }
        .bottle {
            position: absolute;
            width: 40px;
            height: 50px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            font-size: 30px;
            text-align: center;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.3));
        }
        .bottle:hover {
            transform: scale(1.1);
        }
        .bottle:active {
            transform: scale(0.9);
        }
        .footer {
            background: rgba(0,0,0,0.5);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            background: gold;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            border: 2px solid #b8860b;
        }
        button:hover {
            background: #ffd700;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .finish-btn {
            background: #ff4444;
            color: white;
            border: 2px solid #cc0000;
        }
    </style>
</head>
<body>
    <div class="header">
        🍾 СБОРЩИК БУТЫЛОК
    </div>
    <div class="stats">
        <span>Собрано: <span id="count">0</span></span>
        <span>⏱️ Время: <span id="timer">0</span>с</span>
    </div>
    <div class="game-area" id="gameArea">
        <!-- Бутылки будут появляться здесь -->
    </div>
    <div class="footer">
        <button onclick="finishCollection()" class="finish-btn">🏁 ЗАКОНЧИТЬ СБОР</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let collected = 0;
        let timeElapsed = 0;
        let timerInterval;
        let gameActive = true;
        
        // Создаём бутылки
        function createBottle() {
            if (!gameActive) return;
            
            const gameArea = document.getElementById('gameArea');
            const bottle = document.createElement('div');
            bottle.className = 'bottle';
            bottle.innerHTML = '🍾';
            
            // Случайная позиция
            const maxX = gameArea.clientWidth - 50;
            const maxY = gameArea.clientHeight - 60;
            const x = Math.max(10, Math.min(maxX, Math.random() * maxX));
            const y = Math.max(10, Math.min(maxY, Math.random() * maxY));
            
            bottle.style.left = x + 'px';
            bottle.style.top = y + 'px';
            
            bottle.onclick = function() {
                if (!gameActive) return;
                collected++;
                document.getElementById('count').innerText = collected;
                this.remove();
                createBottle(); // создаём новую
            };
            
            gameArea.appendChild(bottle);
            
            // Автоматически удаляем старые бутылки
            setTimeout(() => {
                if (bottle.parentNode) {
                    bottle.remove();
                    if (gameActive) createBottle(); // создаём новую
                }
            }, 5000 + Math.random() * 3000);
        }
        
        // Запускаем создание бутылок
        function startGame() {
            // Создаём несколько начальных бутылок
            for (let i = 0; i < 5; i++) {
                setTimeout(() => createBottle(), i * 200);
            }
            
            // Таймер
            timerInterval = setInterval(() => {
                timeElapsed++;
                document.getElementById('timer').innerText = timeElapsed;
            }, 1000);
        }
        
        // Завершение сбора
        function finishCollection() {
            gameActive = false;
            clearInterval(timerInterval);
            
            // Удаляем все бутылки
            document.querySelectorAll('.bottle').forEach(b => b.remove());
            
            // Отправляем данные в бота
            tg.sendData(JSON.stringify({
                action: 'collect',
                count: collected
            }));
            
            // Показываем результат
            alert(`Сбор завершён! Отправляю данные боту...`);
            
            // Закрываем мини-апп
            setTimeout(() => tg.close(), 1000);
        }
        
        // Запускаем игру при загрузке
        window.onload = startGame;
    </script>
</body>
</html>
